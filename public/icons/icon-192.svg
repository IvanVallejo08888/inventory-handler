<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1aaa52"/>
      <stop offset="100%" stop-color="#0d4f28"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#0a0f0a"/>
  <!-- Circle -->
  <circle cx="96" cy="96" r="72" fill="url(#bg)" stroke="#2dce6b" stroke-width="2.5"/>
  <!-- Text "17" -->
  <text x="96" y="118" font-family="'Segoe UI', system-ui, sans-serif" font-size="68" font-weight="900"
        fill="#5de68a" text-anchor="middle" filter="url(#glow)" letter-spacing="-3">17</text>
  <!-- Subtle top highlight -->
  <ellipse cx="96" cy="48" rx="44" ry="14" fill="rgba(45,206,107,0.15)"/>
</svg>
