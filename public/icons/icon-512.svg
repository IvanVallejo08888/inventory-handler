<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1aaa52"/>
      <stop offset="100%" stop-color="#0d4f28"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#0a0f0a"/>
  <!-- Circle -->
  <circle cx="256" cy="256" r="196" fill="url(#bg)" stroke="#2dce6b" stroke-width="4"/>
  <!-- Text "17" -->
  <text x="256" y="316" font-family="'Segoe UI', system-ui, sans-serif" font-size="180" font-weight="900"
        fill="#5de68a" text-anchor="middle" filter="url(#glow)" letter-spacing="-8">17</text>
  <!-- Subtle top highlight -->
  <ellipse cx="256" cy="128" rx="118" ry="38" fill="rgba(45,206,107,0.15)"/>
</svg>
